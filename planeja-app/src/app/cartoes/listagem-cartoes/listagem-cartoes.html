<header class="header">
    <h1>Meus Cartões</h1>

    <div class="user-area">
        <span class="user-name">Olá, Usuário</span>
        <i class="fa-solid fa-circle-user"></i>
    </div>
</header>

<main class="content">
    <div class="card-full">
        <div class="table-card">

            @if (listagem$ | async; as listagem) {
                <table class="datatable">
                    <thead>
                        <tr>
                            <th>Nome</th>
                            <th>Bandeira</th>
                            <th>Status</th>
                            <th class="text-center">Ações</th>
                        </tr>
                    </thead>

                    <tbody>

                        @for( cartao of listagem.content; track cartao.id ){
                            <tr>
                                <td> {{ cartao.nome }} </td>
                                <td> {{ cartao.bandeira }} </td>
                                <td>
                                    <span class="badge" [ngClass]="cartao.ativo ? 'badge-success' : 'badge-warning'">
                                        {{ cartao.ativo ? 'Ativo' : 'Inativo' }}
                                    </span>
                                </td>
                                <td class="text-center">
                                    <button class="icon-btn" title="Editar" 
                                        (click)="prepararEdicao(cartao.id)">
                                        <i class="fa-solid fa-pen"></i>
                                    </button>

                                    <button class="icon-btn"
                                            [attr.title]="cartao.ativo ? 'Desativar cartão' : 'Ativar cartão'"
                                            [ngClass]="cartao.ativo ? 'danger' : 'success'" 
                                            (click)="mudarStatus(cartao.id)">
                                        <i class="fa-solid" 
                                           [ngClass]="cartao.ativo? 'fa-ban' : 'fa-check'">
                                        </i>
                                    </button>

                                </td>
                            </tr>
                        }

                    </tbody>
                </table>
            }

        </div>
    </div>
</main>
