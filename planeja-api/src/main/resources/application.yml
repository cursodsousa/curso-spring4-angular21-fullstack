spring:
  application:
    name: planeja-api
  datasource:
    url: jdbc:h2:file:./data/planeja-db
#    url: jdbc:h2:mem:planeja-db
    driver-class-name: org.h2.Driver
    username: sa
    password: sa
  jpa:
    hibernate:
      ddl-auto: update #data definition language - SQL
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console



